<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Fitness Center - Latihan Kaki</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans antialiased">
    <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0"><a href="index.html" class="text-2xl font-black text-red-500">GYM<span>FIT</span></a></div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-red-500 font-bold border-b-2 border-red-500 pb-1">Home</a>
                    <a href="about.html" class="text-gray-300 hover:text-red-500">About Us</a>
                    <a href="contact.html" class="text-gray-300 hover:text-red-500">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="flex justify-start md:justify-center items-center gap-3 overflow-x-auto pb-4 mb-10">
            <a href="index.html" class="flex-shrink-0 bg-zinc-900 border border-zinc-800 text-gray-400 px-6 py-3 rounded-full font-bold text-sm">Dada (Chest)</a>
            <a href="perut.html" class="flex-shrink-0 bg-zinc-900 border border-zinc-800 text-gray-400 px-6 py-3 rounded-full font-bold text-sm">Perut (Abs)</a>
            <a href="punggung.html" class="flex-shrink-0 bg-zinc-900 border border-zinc-800 text-gray-400 px-6 py-3 rounded-full font-bold text-sm">Punggung (Back)</a>
            <a href="kaki.html" class="flex-shrink-0 bg-red-600 text-white px-6 py-3 rounded-full font-bold text-sm shadow-md shadow-red-600/20">Kaki (Legs)</a>
        </div>

        <div class="mb-8">
            <h2 class="text-xl md:text-2xl font-black tracking-tight">Daftar Gerakan Kaki Hari Ini</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 flex flex-col justify-between shadow-xl">
                <div>
                    <h3 class="text-lg font-bold text-white mb-4">1. Barbell Squat</h3>
                    <div class="bg-zinc-950 rounded-xl overflow-hidden h-48 flex items-center justify-center border border-zinc-800 mb-4">
                        <img src="img/squat.gif" alt="Barbell Squat" class="w-full h-full object-contain">
                    </div>
                </div>
                <div class="border-t border-zinc-800 pt-4 mt-2">
                    <p class="text-xs text-red-400 font-semibold uppercase tracking-wider mb-2">Target: 4 Set x 10 Reps</p>
                    <input type="text" placeholder="Catatan beban..." class="w-full bg-black border border-zinc-800 text-gray-300 text-sm rounded-lg p-2 focus:outline-none focus:border-red-500 placeholder-zinc-700">
                </div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 flex flex-col justify-between shadow-xl">
                <div>
                    <h3 class="text-lg font-bold text-white mb-4">2. Leg Press</h3>
                    <div class="bg-zinc-950 rounded-xl overflow-hidden h-48 flex items-center justify-center border border-zinc-800 mb-4">
                        <img src="img/leg-press.gif" alt="Leg Press" class="w-full h-full object-contain">
                    </div>
                </div>
                <div class="border-t border-zinc-800 pt-4 mt-2">
                    <p class="text-xs text-red-400 font-semibold uppercase tracking-wider mb-2">Target: 3 Set x 12 Reps</p>
                    <input type="text" placeholder="Catatan beban..." class="w-full bg-black border border-zinc-800 text-gray-300 text-sm rounded-lg p-2 focus:outline-none focus:border-red-500 placeholder-zinc-700">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
