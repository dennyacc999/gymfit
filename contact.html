<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Fitness Center - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
    </script>
</head>
<body class="bg-black text-white font-sans antialiased">

    <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-black tracking-wider text-red-500">GYM<span class="text-white">FIT</span></a>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-300 hover:text-red-500 transition">Home</a>
                    <a href="about.html" class="text-gray-300 hover:text-red-500 transition">About Us</a>
                    <a href="contact.html" class="text-red-500 font-bold border-b-2 border-red-500 pb-1">Contact</a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="signin.html" class="text-sm text-gray-300 hover:text-white transition">Sign In</a>
                    <a href="signup.html" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl font-bold transition text-sm">Sign Up</a>
                </div>
                <div class="md:hidden">
                    <button onclick="toggleMenu()" class="text-gray-400 hover:text-white p-2">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-zinc-950 border-b border-zinc-800 px-4 pt-2 pb-4 space-y-3">
            <a href="index.html" class="block text-gray-300 hover:text-red-500">Home</a>
            <a href="about.html" class="block text-gray-300 hover:text-red-500">About Us</a>
            <a href="contact.html" class="block text-red-500 font-bold">Contact</a>
            <div class="border-t border-zinc-800 pt-3 flex flex-col space-y-2">
                <a href="signin.html" class="text-center text-sm text-gray-300 py-2">Sign In</a>
                <a href="signup.html" class="text-center bg-red-600 text-white py-2.5 rounded-xl font-bold text-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-16">
        <div class="text-center mb-12">
            <span class="text-xs font-bold tracking-widest text-red-500 uppercase bg-red-500/10 px-3 py-1.5 rounded-full">HUBUNGI KAMI</span>
            <h1 class="text-3xl md:text-5xl font-black mt-4">KONSULTASI DENGAN TRAINER</h1>
            <p class="text-gray-400 text-sm mt-2">Punya pertanyaan seputar program latihan otot dada atau lainnya? Kirim pesan di bawah.</p>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 md:p-8 shadow-2xl max-w-xl mx-auto">
            <form action="#" method="POST" class="space-y-5" onsubmit="event.preventDefault(); alert('Pesan berhasil dikirim! (Simulasi statis ujian)');">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nama Lengkap</label>
                    <input type="text" required placeholder="Masukkan nama kamu" class="w-full bg-black border border-zinc-850 text-white rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 placeholder-zinc-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Alamat Email</label>
                    <input type="email" required placeholder="name@example.com" class="w-full bg-black border border-zinc-850 text-white rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 placeholder-zinc-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Pesan atau Pertanyaan</label>
                    <textarea rows="4" required placeholder="Contoh: Mas, rekomendasi beban awal buat Bench Press berapa ya?" class="w-full bg-black border border-zinc-850 text-white rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 placeholder-zinc-700"></textarea>
                </div>
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white py-3.5 rounded-xl font-bold transition text-sm shadow-lg shadow-red-600/10">
                    Kirim Pesan
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-zinc-950 border-t border-zinc-900 py-6 text-center text-xs text-gray-600 mt-16">
        <p>&copy; 2026 GYMFIT Center. Tugas Project Ujian Web Responsive.</p>
    </footer>

</body>
</html>
